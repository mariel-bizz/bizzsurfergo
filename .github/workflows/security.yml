name: Security Scan

on:
  push:
    branches: [main]
  pull_request:
  schedule:
    # Weekly full scan, Mondays 06:00 UTC
    - cron: "0 6 * * 1"
  workflow_dispatch:

permissions:
  contents: read
  security-events: write
  pull-requests: read

jobs:
  # ---------------------------------------------------------------------------
  # 1. Dependency vulnerabilities (npm advisory DB)
  # ---------------------------------------------------------------------------
  dependencies:
    name: Dependency audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      - run: bun install --frozen-lockfile
      - name: Audit (high + critical)
        run: bunx --bun audit-ci --high --report-type summary

  # ---------------------------------------------------------------------------
  # 2. Static code analysis (CodeQL — JS/TS)
  # ---------------------------------------------------------------------------
  codeql:
    name: CodeQL (JavaScript/TypeScript)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: github/codeql-action/init@v3
        with:
          languages: javascript-typescript
          queries: security-extended
      - uses: github/codeql-action/analyze@v3
        continue-on-error: true
        with:
          category: "/language:javascript-typescript"

  # ---------------------------------------------------------------------------
  # 3. Secret scanning (Gitleaks) — fails the build on any committed secret
  # ---------------------------------------------------------------------------
  secrets:
    name: Secret scan (Gitleaks)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # ---------------------------------------------------------------------------
  # 4. Database migration safety
  #    - Validates Supabase SQL migrations with sqlfluff
  #    - Flags risky patterns (RLS disabled, wide-open policies, public-schema
  #      extensions, ALTER DATABASE, etc.)
  # ---------------------------------------------------------------------------
  migrations:
    name: Migration safety
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Detect migrations
        id: check
        shell: bash
        run: |
          if ls supabase/migrations/*.sql >/dev/null 2>&1; then
            echo "has_migrations=true" >> "$GITHUB_OUTPUT"
          else
            echo "has_migrations=false" >> "$GITHUB_OUTPUT"
            echo "No migrations found — skipping lint and risky-pattern checks."
          fi

      - name: Set up Python
        if: steps.check.outputs.has_migrations == 'true'
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: .github/workflows/security.yml

      - name: Install sqlfluff
        if: steps.check.outputs.has_migrations == 'true'
        run: pip install sqlfluff==3.2.5

      - name: Prepare reports directory
        if: steps.check.outputs.has_migrations == 'true'
        run: mkdir -p migration-reports

      - name: Lint migrations (PostgreSQL dialect)
        if: steps.check.outputs.has_migrations == 'true'
        run: |
          sqlfluff lint --dialect postgres --format github-annotation-native supabase/migrations \
            | tee migration-reports/sqlfluff.txt || true
          sqlfluff lint --dialect postgres --format json supabase/migrations \
            > migration-reports/sqlfluff.json || true

      - name: Risky migration patterns
        if: steps.check.outputs.has_migrations == 'true'
        shell: bash
        run: |
          set -uo pipefail
          fail=0
          files=$(ls supabase/migrations/*.sql 2>/dev/null || true)
          [ -z "$files" ] && { echo "No migrations."; exit 0; }

          : > migration-reports/risky-patterns.txt

          check() {
            local label="$1" pattern="$2"
            local hits
            # Exclude lines explicitly allow-listed with the lovable:allow-open-rls marker
            hits=$(grep -InE "$pattern" $files | grep -v "lovable:allow-open-rls" || true)
            if [ -n "$hits" ]; then
              echo "::error title=Risky migration::$label detected"
              {
                echo "## $label"
                echo '```'
                echo "$hits"
                echo '```'
                echo
              } >> migration-reports/risky-patterns.txt
              fail=1
            fi
          }

          # New tables must have RLS enabled in the same migration
          while IFS= read -r f; do
            if grep -qiE "create[[:space:]]+table[[:space:]]+(public\.)?[a-z_]+" "$f"; then
              if ! grep -qiE "enable[[:space:]]+row[[:space:]]+level[[:space:]]+security" "$f"; then
                echo "::error file=$f::CREATE TABLE without ENABLE ROW LEVEL SECURITY"
                echo "- $f: CREATE TABLE without ENABLE ROW LEVEL SECURITY" \
                  >> migration-reports/risky-patterns.txt
                fail=1
              fi
            fi
          done <<< "$files"

          check "Wide-open RLS policy (USING true / WITH CHECK true)" \
            "(USING|WITH CHECK)[[:space:]]*\(\s*true\s*\)"
          check "ALTER DATABASE statement (forbidden)" \
            "ALTER[[:space:]]+DATABASE"
          check "Extension created in public schema" \
            "CREATE[[:space:]]+EXTENSION([^;]*)(WITH[[:space:]]+)?SCHEMA[[:space:]]+public"
          check "Disabling RLS" \
            "DISABLE[[:space:]]+ROW[[:space:]]+LEVEL[[:space:]]+SECURITY"
          check "GRANT ALL to PUBLIC / anon" \
            "GRANT[[:space:]]+ALL[[:space:]]+.*TO[[:space:]]+(PUBLIC|anon)"

          exit $fail

      - name: Upload migration reports
        if: always() && steps.check.outputs.has_migrations == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: migration-reports-${{ github.sha }}
          path: migration-reports/
          retention-days: 30
          if-no-files-found: ignore

  # ---------------------------------------------------------------------------
  # 5. SBOM (CycloneDX) — dependency traceability
  # ---------------------------------------------------------------------------
  sbom:
    name: Generate SBOM (CycloneDX)
    runs-on: ubuntu-latest
    outputs:
      artifact-name: ${{ steps.upload.outputs.artifact-name }}
      artifact-url: ${{ steps.upload.outputs.artifact-url }}
      components: ${{ steps.summary.outputs.components }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
      - name: Install dependencies (npm, for lockfile-based SBOM)
        run: npm ci --no-audit --no-fund --ignore-scripts
      - name: Generate CycloneDX SBOM (JSON + XML)
        run: |
          mkdir -p sbom
          npx --yes @cyclonedx/cyclonedx-npm@^1.19.3 \
            --output-format JSON \
            --output-file sbom/sbom.cdx.json \
            --spec-version 1.5 \
            --omit dev
          npx --yes @cyclonedx/cyclonedx-npm@^1.19.3 \
            --output-format XML \
            --output-file sbom/sbom.cdx.xml \
            --spec-version 1.5 \
            --omit dev
      - name: Summarize SBOM
        id: summary
        run: |
          components=$(jq '.components | length' sbom/sbom.cdx.json)
          echo "components=$components" >> "$GITHUB_OUTPUT"
          {
            echo "## SBOM"
            echo "- Format: CycloneDX 1.5"
            echo "- Components: $components"
            echo "- Commit: \`${GITHUB_SHA}\`"
          } >> "$GITHUB_STEP_SUMMARY"
      - name: Upload SBOM artifact
        id: upload
        uses: actions/upload-artifact@v4
        with:
          name: sbom-cyclonedx-${{ github.sha }}
          path: sbom/
          retention-days: 90
          if-no-files-found: error
      - name: Expose artifact name
        run: echo "artifact-name=sbom-cyclonedx-${{ github.sha }}" >> "$GITHUB_OUTPUT"
        id: name

  # ---------------------------------------------------------------------------
  # 6. Summary gate — fails PR if any critical job failed
  # ---------------------------------------------------------------------------
  gate:
    name: Security gate
    needs: [dependencies, codeql, secrets, migrations, sbom]
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: Write PR summary
        if: always()
        run: |
          {
            echo "## Security gate"
            echo ""
            echo "| Check | Result |"
            echo "|---|---|"
            echo "| Dependencies | ${{ needs.dependencies.result }} |"
            echo "| CodeQL | ${{ needs.codeql.result }} |"
            echo "| Secrets | ${{ needs.secrets.result }} |"
            echo "| Migrations | ${{ needs.migrations.result }} |"
            echo "| SBOM | ${{ needs.sbom.result }} |"
            echo ""
            if [ -n "${{ needs.sbom.outputs.artifact-url }}" ]; then
              echo "### SBOM artifact"
              echo ""
              echo "[Download \`sbom-cyclonedx-${{ github.sha }}\` (${{ needs.sbom.outputs.components }} components)](${{ needs.sbom.outputs.artifact-url }})"
            else
              echo "_SBOM artifact not available for this run._"
            fi
          } >> "$GITHUB_STEP_SUMMARY"
      - name: Verify all checks passed
        run: |
          if [[ "${{ needs.dependencies.result }}" != "success" || \
                "${{ needs.codeql.result }}"       != "success" || \
                "${{ needs.secrets.result }}"      != "success" || \
                "${{ needs.sbom.result }}"         != "success" || \
                ( "${{ needs.migrations.result }}" != "success" && \
                  "${{ needs.migrations.result }}" != "skipped" ) ]]; then
            echo "One or more security checks failed."
            exit 1
          fi
          echo "All security checks passed."

